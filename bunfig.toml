# Bun workspace configuration
# https://bun.sh/docs/runtime/bunfig

[install]
# Use the workspace lockfile at the root for all packages
# lockfile = true

# Prefer exact versions to avoid accidental upgrades in a monorepo
exact = true

[install.cache]
# Share a single cache across all workspace packages
dir = "~/.bun/install/cache"
disable = false

[test]
# Default timeout per test (ms)
timeout = 10000

# Run tests matching this pattern by default
# Override per-package in each app's bunfig.toml if needed
coverage = false

[console]
depth = 3