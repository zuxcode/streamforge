name: streamforge

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Local S3-compatible storage (MinIO)
  # minio:
  #   image: minio/minio:latest
  #   restart: unless-stopped
  #   ports:
  #     - "9000:9000"   # S3 API
  #     - "9001:9001"   # MinIO console
  #   environment:
  #     MINIO_ROOT_USER: ${SF_S3_ACCESS_KEY_ID:-minioadmin}
  #     MINIO_ROOT_PASSWORD: ${SF_S3_SECRET_ACCESS_KEY:-minioadmin}
  #   volumes:
  #     - minio-data:/data
  #   command: server /data --console-address ":9001"
  #   healthcheck:
  #     test: ["CMD", "mc", "ready", "local"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Creates the S3 bucket on first start
  # minio-init:
  #   image: minio/mc:latest
  #   depends_on:
  #     minio:
  #       condition: service_healthy
  #   entrypoint: >
  #     /bin/sh -c "
  #       mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
  #       mc mb --ignore-existing local/$${SF_S3_BUCKET:-streamforge};
  #       mc anonymous set download local/$${SF_S3_BUCKET:-streamforge};
  #       echo 'Bucket ready.';
  #     "
  #   environment:
  #     MINIO_ROOT_USER: ${SF_S3_ACCESS_KEY_ID:-minioadmin}
  #     MINIO_ROOT_PASSWORD: ${SF_S3_SECRET_ACCESS_KEY:-minioadmin}
  #     SF_S3_BUCKET: ${SF_S3_BUCKET:-streamforge}

  # ---------------------------------------------------------------------------
  # Services
  # ---------------------------------------------------------------------------

  ingest:
    build:
      context: ..
      dockerfile: apps/ingest/Dockerfile
    restart: unless-stopped
    ports:
      - "${INGEST_PORT:-3000}:${INGEST_PORT:-3000}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SF_REDIS_URL: redis://redis:6379
      SF_S3_BUCKET: ${SF_S3_BUCKET:-streamforge}
      SF_S3_REGION: ${SF_S3_REGION:-us-east-1}
      SF_S3_ACCESS_KEY_ID: ${SF_S3_ACCESS_KEY_ID:-minioadmin}
      SF_S3_SECRET_ACCESS_KEY: ${SF_S3_SECRET_ACCESS_KEY:-minioadmin}
      SF_S3_ENDPOINT: http://minio:9000
      INGEST_PORT: ${INGEST_PORT:-3000}
      INGEST_MAX_UPLOAD_SIZE: ${INGEST_MAX_UPLOAD_SIZE:-2147483648}
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${INGEST_PORT:-3000}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  transcode:
    build:
      context: ..
      dockerfile: apps/transcode/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SF_REDIS_URL: redis://redis:6379
      SF_S3_BUCKET: ${SF_S3_BUCKET:-streamforge}
      SF_S3_REGION: ${SF_S3_REGION:-us-east-1}
      SF_S3_ACCESS_KEY_ID: ${SF_S3_ACCESS_KEY_ID:-minioadmin}
      SF_S3_SECRET_ACCESS_KEY: ${SF_S3_SECRET_ACCESS_KEY:-minioadmin}
      SF_S3_ENDPOINT: http://minio:9000
      TRANSCODE_CONCURRENCY: ${TRANSCODE_CONCURRENCY:-2}
      TRANSCODE_TMP_DIR: ${TRANSCODE_TMP_DIR:-/tmp/streamforge}
      TRANSCODE_SEGMENT_DURATION: ${TRANSCODE_SEGMENT_DURATION:-6}
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      # Writable temp directory for ffmpeg working files
      - transcode-tmp:/tmp/streamforge

  serve:
    build:
      context: ..
      dockerfile: apps/serve/Dockerfile
    restart: unless-stopped
    ports:
      - "${SERVE_PORT:-3002}:${SERVE_PORT:-3002}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SF_S3_BUCKET: ${SF_S3_BUCKET:-streamforge}
      SF_S3_REGION: ${SF_S3_REGION:-us-east-1}
      SF_S3_ACCESS_KEY_ID: ${SF_S3_ACCESS_KEY_ID:-minioadmin}
      SF_S3_SECRET_ACCESS_KEY: ${SF_S3_SECRET_ACCESS_KEY:-minioadmin}
      SF_S3_ENDPOINT: http://minio:9000
      SERVE_PORT: ${SERVE_PORT:-3002}
      SERVE_CACHE_TTL: ${SERVE_CACHE_TTL:-86400}
      SERVE_CORS_ORIGINS: ${SERVE_CORS_ORIGINS:-*}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVE_PORT:-3002}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  minio-data:
  transcode-tmp: